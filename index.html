<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lane Aesthetic Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="snow-container"></div>
    
    <div class="bg-glow"></div>

    <main class="glass-wrapper">
        <header class="player-info">
            <h1 class="glitch-text">SOUNDCLOUD</h1>
            <div class="status-bar">
                <span class="dot"></span> ONLINE RECS
            </div>
        </header>

        <section class="content-area">
            <iframe width="100%" height="350" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/ID_ПЛЕЙЛИСТА&color=%237c3aed&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
            </iframe>
        </section>

        <footer>
            <p class="fade-in">VISUALIZED BY GEMINI & YOU</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
