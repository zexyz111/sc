<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>My SoundCloud Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    <div class="glass-container">
        <header>
            <h1>SOUNDCLOUD</h1>
            <p>MY RECENT TRACKS</p>
        </header>
        
        <!-- Вставь ссылку на свой плейлист ниже -->
        <div class="player-wrapper">
            <iframe width="100%" height="450" scrolling="no" frameborder="no" allow="autoplay" 
            src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/ЗДЕСЬ_ID_ТВОЕГО_ПЛЕЙЛИСТА&color=%238e44ad&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"></iframe>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
